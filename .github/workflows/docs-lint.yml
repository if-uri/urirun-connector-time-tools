name: docs-lint
on: [push, pull_request]
jobs:
  docs-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: ifURI documentation standard
        # Self-contained mirror of if-uri/ifuri-com scripts/docs-lint.sh
        # Standard: https://docs.ifuri.com/repo-standards.html
        run: |
          miss=()
          for f in README.md CHANGELOG.md VERSION LICENSE CONTRIBUTING.md; do
            [ -f "$f" ] || miss+=("$f")
          done
          if [ -f README.md ]; then
            [ "$(wc -l < README.md)" -ge 20 ] || miss+=("README<20lines")
            grep -qiE 'licen[sc]e|MIT|Apache' README.md || miss+=("README:no-license-link")
          fi
          if [ -f CHANGELOG.md ]; then
            grep -qiE '^## \[?([0-9v]|unreleased)' CHANGELOG.md || miss+=("CHANGELOG:not-keepachangelog")
          fi
          case "${GITHUB_REPOSITORY##*/}" in
            urirun-connector-*)
              if [ -f README.md ] && ! grep -qE '[a-z][a-z0-9-]*://' README.md; then miss+=("connector:no-uri-scheme"); fi ;;
          esac
          if [ ${#miss[@]} -eq 0 ]; then
            echo "docs-lint: conforms to the ifURI documentation standard"
          else
            echo "docs-lint FAIL: ${miss[*]}"
            echo "See https://docs.ifuri.com/repo-standards.html"
            exit 1
          fi
